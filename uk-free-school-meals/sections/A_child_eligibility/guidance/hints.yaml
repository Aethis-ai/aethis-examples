hints:
  - >
    This section determines only whether the child is eligible to receive free school meals
    on the basis of their age and school type. It does not assess household income or
    benefit status — those are determined in Section B (household_qualifying_criteria).
    The two sections are composed together: both must pass for means-tested eligibility.

  - >
    The field child.age should represent the child's age in whole years at the start of
    the relevant academic year (1 September). A child aged 4 at the start of the school
    year is typically in Reception class and is within scope. A child aged 16 or over
    is only within scope if they are still in full-time education at a state-funded school.

  - >
    The field child.school_type should be an enum with values: state_funded, independent,
    home_educated. Only state_funded schools (maintained schools and Academies) are within
    scope. Independent schools and home-educated children are not.
